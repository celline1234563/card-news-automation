<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #2563EB;
  --color-secondary: #10B981;
  --color-background: #F0F4FF;
  --color-text: #1A1A2E;
  --color-highlight: #FEF08A;
  --color-accent: #EF4444;
  --color-white: #FFFFFF;
  --color-black: #111111;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: visible;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all; line-height: 1.45;
  background: var(--color-background); color: var(--color-text);
}
.card {
  width: 1080px; height: 1350px; padding: 50px 56px; position: relative;
  display: flex; flex-direction: column;
}
.card-num {
  position: absolute; top: 24px; right: 50px;
  font-size: 16px; font-weight: 700; color: var(--color-primary); opacity: 0.5;
}
.headline {
  font-size: 44px; font-weight: 900;
  color: var(--color-text); margin-bottom: 24px;
}
.grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 20px; flex: 1; align-content: center;
}
.box {
  background: var(--color-white);
  border-radius: 20px;
  padding: 44px 36px;
  border-top: 5px solid var(--color-primary);
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  display: flex; flex-direction: column;
}
.box-icon {
  width: 60px; height: 60px;
  background: var(--color-primary); border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  color: var(--color-white); font-size: 28px; font-weight: 900;
  margin-bottom: 20px;
}
.box-title {
  font-size: 28px; font-weight: 700;
  margin-bottom: 10px; color: var(--color-text);
}
.box-desc {
  font-size: 22px; color: var(--color-text);
  opacity: 0.6; line-height: 1.5;
}
.subtext {
  margin-top: auto; padding-top: 20px; font-size: 22px;
  color: var(--color-text); opacity: 0.5;
}
em.highlight { background: var(--color-highlight); font-style: normal; padding: 2px 8px; }
em.color { color: var(--color-primary); font-weight: 900; font-style: normal; }
em.underline { border-bottom: 6px solid var(--color-accent); font-style: normal; padding-bottom: 2px; }
</style>
</head>
<body>
<div class="card">
  <span class="card-num">{{card_number}}</span>
  <h1 class="headline">{{headline}}</h1>
  <div class="grid">
    <div class="box">
      <div class="box-icon">{{icon_1}}</div>
      <div class="box-title">{{item_title_1}}</div>
      <div class="box-desc">{{item_desc_1}}</div>
    </div>
    <div class="box">
      <div class="box-icon">{{icon_2}}</div>
      <div class="box-title">{{item_title_2}}</div>
      <div class="box-desc">{{item_desc_2}}</div>
    </div>
    <div class="box">
      <div class="box-icon">{{icon_3}}</div>
      <div class="box-title">{{item_title_3}}</div>
      <div class="box-desc">{{item_desc_3}}</div>
    </div>
    <div class="box">
      <div class="box-icon">{{icon_4}}</div>
      <div class="box-title">{{item_title_4}}</div>
      <div class="box-desc">{{item_desc_4}}</div>
    </div>
  </div>
  <p class="subtext">{{subtext}}</p>
</div>
</body>
</html>
