<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #2563EB;
  --color-secondary: #10B981;
  --color-background: #F0F4FF;
  --color-text: #1A1A2E;
  --color-highlight: #FEF08A;
  --color-accent: #EF4444;
  --color-white: #FFFFFF;
  --color-black: #111111;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all;
  background: var(--color-background); color: var(--color-text);
}
.card {
  width: 1080px; height: 1350px;
  padding: 72px 80px;
  display: flex; flex-direction: column;
  position: relative;
}

.tag {
  font-size: 22px; font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 2px; margin-bottom: 16px;
  text-transform: uppercase; opacity: 0.7;
}
.headline {
  font-size: 52px; font-weight: 900;
  line-height: 1.3; margin-bottom: 12px;
  color: var(--color-text);
}
.headline-sub {
  font-size: 24px; font-weight: 400;
  color: var(--color-text); opacity: 0.5;
  line-height: 1.6; margin-bottom: 40px;
}

.grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 20px; flex: 1; align-content: center;
}
.box {
  background: var(--color-white);
  border-radius: 20px; padding: 36px 32px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.box::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 100%; height: 4px;
  background: var(--color-primary); opacity: 0.6;
}
.box-icon {
  width: 52px; height: 52px;
  background: var(--color-primary);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 900;
  color: var(--color-white); margin-bottom: 16px;
}
.box-title {
  font-size: 28px; font-weight: 900;
  margin-bottom: 10px; line-height: 1.3;
  color: var(--color-text);
}
.box-desc {
  font-size: 20px;
  color: var(--color-text); opacity: 0.5;
  line-height: 1.5;
}

.footer {
  margin-top: 32px;
  display: flex; justify-content: space-between;
  align-items: flex-end;
}
.brand-name {
  font-size: 22px; font-weight: 700;
  color: var(--color-primary); opacity: 0.4;
  letter-spacing: 2px;
}
.page-num {
  font-size: 22px; color: var(--color-text); opacity: 0.25;
}

em.highlight {
  font-style: normal; font-weight: 900;
  background: linear-gradient(to top, var(--color-highlight) 40%, transparent 40%);
  padding: 0 4px;
  box-decoration-break: clone; -webkit-box-decoration-break: clone;
}
em.color { font-style: normal; font-weight: 900; color: var(--color-primary); }
em.underline { font-style: normal; font-weight: 900; border-bottom: 5px solid var(--color-accent); padding-bottom: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="tag">{{tag}}</div>
  <h1 class="headline">{{headline}}</h1>
  <p class="headline-sub">{{body}}</p>
  <div class="grid">
    <div class="box">
      <div class="box-icon">{{icon_1}}</div>
      <div class="box-title">{{item_title_1}}</div>
      <div class="box-desc">{{item_desc_1}}</div>
    </div>
    <div class="box">
      <div class="box-icon">{{icon_2}}</div>
      <div class="box-title">{{item_title_2}}</div>
      <div class="box-desc">{{item_desc_2}}</div>
    </div>
    <div class="box">
      <div class="box-icon">{{icon_3}}</div>
      <div class="box-title">{{item_title_3}}</div>
      <div class="box-desc">{{item_desc_3}}</div>
    </div>
    <div class="box">
      <div class="box-icon">{{icon_4}}</div>
      <div class="box-title">{{item_title_4}}</div>
      <div class="box-desc">{{item_desc_4}}</div>
    </div>
  </div>
  <div class="footer">
    <span class="brand-name">{{academy_name}}</span>
    <span class="page-num">{{card_number}}</span>
  </div>
</div>
</body>
</html>
