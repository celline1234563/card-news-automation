<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #2563EB;
  --color-secondary: #10B981;
  --color-background: #F0F4FF;
  --color-text: #1A1A2E;
  --color-highlight: #FEF08A;
  --color-accent: #EF4444;
  --color-white: #FFFFFF;
  --color-black: #111111;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: visible;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all; line-height: 1.45;
  background: var(--color-white); color: var(--color-text);
}
.card {
  width: 1080px; height: 1350px; padding: 50px 56px; position: relative;
  display: flex; flex-direction: column;
}
.card-num { position: absolute; top: 24px; right: 50px; font-size: 16px; font-weight: 700; color: var(--color-primary); opacity: 0.5; }
.headline { font-size: 42px; font-weight: 900; color: var(--color-primary); text-align: center; margin-bottom: 28px; }
.compare { display: flex; gap: 24px; flex: 1; }
.side {
  flex: 1; border-radius: 24px; padding: 48px 40px;
  display: flex; flex-direction: column;
}
.before {
  background: #f3f4f6; color: var(--color-text);
}
.after {
  background: var(--color-primary); color: var(--color-white);
}
.label {
  font-size: 18px; font-weight: 900; letter-spacing: 3px;
  opacity: 0.5; margin-bottom: 24px;
}
.side-title {
  font-size: 34px; font-weight: 900; margin-bottom: 36px;
  line-height: 1.3;
}
.side-items {
  font-size: 26px; line-height: 2;
}
.vs {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--color-accent); color: var(--color-white);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 900;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 2;
}
.subtext { margin-top: 20px; font-size: 22px; text-align: center; color: var(--color-text); opacity: 0.5; }
em.highlight { background: var(--color-highlight); font-style: normal; padding: 2px 8px; }
em.color { color: var(--color-primary); font-weight: 900; font-style: normal; }
em.underline { border-bottom: 6px solid var(--color-accent); font-style: normal; padding-bottom: 2px; }
</style>
</head>
<body>
<div class="card">
  <span class="card-num">{{card_number}}</span>
  <h1 class="headline">{{headline}}</h1>
  <div class="compare">
    <div class="side before">
      <span class="label">BEFORE</span>
      <div class="side-title">{{before_title}}</div>
      <div class="side-items">{{before_items}}</div>
    </div>
    <div class="side after">
      <span class="label">AFTER</span>
      <div class="side-title">{{after_title}}</div>
      <div class="side-items">{{after_items}}</div>
    </div>
  </div>
  <div class="vs">VS</div>
  <p class="subtext">{{subtext}}</p>
</div>
</body>
</html>
