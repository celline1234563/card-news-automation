<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #2563EB;
  --color-secondary: #10B981;
  --color-background: #F0F4FF;
  --color-text: #1A1A2E;
  --color-highlight: #FEF08A;
  --color-accent: #EF4444;
  --color-white: #FFFFFF;
  --color-black: #111111;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all;
  background: var(--color-background); color: var(--color-text);
}
.card {
  width: 1080px; height: 1350px;
  padding: 72px 80px;
  display: flex; flex-direction: column;
  position: relative;
}

.tag {
  font-size: 22px; font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 2px; margin-bottom: 16px;
  text-transform: uppercase; opacity: 0.7;
}
.headline {
  font-size: 48px; font-weight: 900;
  line-height: 1.3; margin-bottom: 12px;
  color: var(--color-text);
}
.headline-sub {
  font-size: 24px; font-weight: 400;
  color: var(--color-text); opacity: 0.5;
  line-height: 1.6; margin-bottom: 32px;
}

.vs-badge {
  width: 72px; height: 72px;
  background: var(--color-accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900;
  color: var(--color-white);
  margin: 0 auto 24px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}

.compare {
  display: flex; gap: 20px; flex: 1;
}
.side {
  flex: 1; border-radius: 20px;
  padding: 40px 32px;
  display: flex; flex-direction: column;
}
.before {
  background: var(--color-white);
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.after {
  background: var(--color-primary);
  color: var(--color-white);
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
}

.label {
  font-size: 16px; font-weight: 900;
  letter-spacing: 3px; opacity: 0.4;
  margin-bottom: 20px;
}
.side-icon { font-size: 36px; margin-bottom: 16px; }
.side-title {
  font-size: 30px; font-weight: 900;
  margin-bottom: 24px; line-height: 1.3;
}
.after .side-title { color: var(--color-secondary); }

.side-items {
  font-size: 22px; line-height: 2.2;
  color: var(--color-text); opacity: 0.6;
}
.after .side-items {
  color: rgba(255,255,255,0.8);
  opacity: 1; font-weight: 500;
}

.footer {
  margin-top: 28px;
  display: flex; justify-content: space-between;
  align-items: flex-end;
}
.brand-name {
  font-size: 22px; font-weight: 700;
  color: var(--color-primary); opacity: 0.4;
  letter-spacing: 2px;
}
.page-num {
  font-size: 22px; color: var(--color-text); opacity: 0.25;
}

em.highlight {
  font-style: normal; font-weight: 900;
  background: linear-gradient(to top, var(--color-highlight) 40%, transparent 40%);
  padding: 0 4px;
  box-decoration-break: clone; -webkit-box-decoration-break: clone;
}
em.color { font-style: normal; font-weight: 900; color: var(--color-primary); }
em.underline { font-style: normal; font-weight: 900; border-bottom: 5px solid var(--color-accent); padding-bottom: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="tag">COMPARE</div>
  <h1 class="headline">{{headline}}</h1>
  <p class="headline-sub">{{subtext}}</p>
  <div class="vs-badge">VS</div>
  <div class="compare">
    <div class="side before">
      <span class="label">BEFORE</span>
      <div class="side-icon">✕</div>
      <div class="side-title">{{before_title}}</div>
      <div class="side-items">{{before_items}}</div>
    </div>
    <div class="side after">
      <span class="label">AFTER</span>
      <div class="side-icon">◎</div>
      <div class="side-title">{{after_title}}</div>
      <div class="side-items">{{after_items}}</div>
    </div>
  </div>
  <div class="footer">
    <span class="brand-name">{{academy_name}}</span>
    <span class="page-num">{{card_number}}</span>
  </div>
</div>
</body>
</html>
