<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #2563EB;
  --color-secondary: #10B981;
  --color-background: #F0F4FF;
  --color-text: #1A1A2E;
  --color-highlight: #FEF08A;
  --color-accent: #EF4444;
  --color-white: #FFFFFF;
  --color-black: #111111;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: visible;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all; line-height: 1.45;
  background: var(--color-background); color: var(--color-text);
}
.card {
  width: 1080px; height: 1350px; padding: 50px 56px; position: relative;
  display: flex; flex-direction: column;
}
.top-bar {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 8px; background: var(--color-primary);
}
.card-num {
  position: absolute; top: 18px; right: 50px;
  font-size: 16px; font-weight: 700; color: var(--color-primary); opacity: 0.5;
}
.headline {
  font-size: 46px; font-weight: 900;
  margin-top: 24px; margin-bottom: 28px;
  color: var(--color-text);
}
.list {
  display: flex; flex-direction: column;
  flex: 1; justify-content: space-evenly;
}
.list-item {
  display: flex; align-items: center;
  background: var(--color-white);
  border-radius: 16px; padding: 36px 40px;
  border-left: 5px solid var(--color-primary);
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.check {
  width: 44px; height: 44px; min-width: 44px;
  background: var(--color-primary); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-right: 24px; color: var(--color-white); font-size: 20px; font-weight: 900;
}
.item-text { font-size: 30px; font-weight: 500; }
.subtext {
  margin-top: auto; padding-top: 20px; font-size: 22px;
  color: var(--color-text); opacity: 0.5;
}
em.highlight { background: var(--color-highlight); font-style: normal; padding: 2px 8px; }
em.color { color: var(--color-primary); font-weight: 900; font-style: normal; }
em.underline { border-bottom: 6px solid var(--color-accent); font-style: normal; padding-bottom: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="top-bar"></div>
  <span class="card-num">{{card_number}}</span>
  <h1 class="headline">{{headline}}</h1>
  <div class="list">
    <div class="list-item"><span class="check">&#10003;</span><span class="item-text">{{item_1}}</span></div>
    <div class="list-item"><span class="check">&#10003;</span><span class="item-text">{{item_2}}</span></div>
    <div class="list-item"><span class="check">&#10003;</span><span class="item-text">{{item_3}}</span></div>
    <div class="list-item"><span class="check">&#10003;</span><span class="item-text">{{item_4}}</span></div>
    <div class="list-item"><span class="check">&#10003;</span><span class="item-text">{{item_5}}</span></div>
  </div>
  <p class="subtext">{{subtext}}</p>
</div>
</body>
</html>
