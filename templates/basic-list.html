<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #2563EB;
  --color-secondary: #10B981;
  --color-background: #F0F4FF;
  --color-text: #1A1A2E;
  --color-highlight: #FEF08A;
  --color-accent: #EF4444;
  --color-white: #FFFFFF;
  --color-black: #111111;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all;
  background: var(--color-background); color: var(--color-text);
}
.card {
  width: 1080px; height: 1350px;
  padding: 72px 80px;
  display: flex; flex-direction: column;
  position: relative;
}

.tag {
  font-size: 22px; font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 2px; margin-bottom: 16px;
  text-transform: uppercase; opacity: 0.7;
}
.headline {
  font-size: 52px; font-weight: 900;
  line-height: 1.3; margin-bottom: 12px;
  color: var(--color-text);
}
.sub-headline {
  font-size: 24px; font-weight: 400;
  color: var(--color-text); opacity: 0.5;
  line-height: 1.6; margin-bottom: 36px;
}

.list {
  display: flex; flex-direction: column;
  gap: 16px; flex: 1; justify-content: center;
}
.list-item {
  background: var(--color-white);
  border-radius: 16px; padding: 28px 32px;
  display: flex; align-items: flex-start; gap: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.num {
  width: 48px; height: 48px; min-width: 48px;
  background: var(--color-primary);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900;
  color: var(--color-white); margin-top: 2px;
}
.item-content { flex: 1; }
.item-title {
  font-size: 28px; font-weight: 900;
  margin-bottom: 6px; line-height: 1.3;
  color: var(--color-text);
}
.item-text {
  font-size: 22px; font-weight: 400;
  color: var(--color-text); opacity: 0.5;
  line-height: 1.5;
}

.bottom-box {
  margin-top: 28px;
  background: var(--color-primary);
  border-radius: 16px; padding: 24px 36px;
}
.bottom-box p {
  font-size: 22px; font-weight: 500;
  line-height: 1.7; color: var(--color-white);
}

.footer {
  margin-top: 28px;
  display: flex; justify-content: space-between;
  align-items: flex-end;
}
.brand-name {
  font-size: 22px; font-weight: 700;
  color: var(--color-primary); opacity: 0.4;
  letter-spacing: 2px;
}
.page-num {
  font-size: 22px; color: var(--color-text); opacity: 0.25;
}

em.highlight {
  font-style: normal; font-weight: 900;
  background: linear-gradient(to top, var(--color-highlight) 40%, transparent 40%);
  padding: 0 4px;
  box-decoration-break: clone; -webkit-box-decoration-break: clone;
}
em.color { font-style: normal; font-weight: 900; color: var(--color-primary); }
em.underline { font-style: normal; font-weight: 900; border-bottom: 5px solid var(--color-accent); padding-bottom: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="tag">{{tag}}</div>
  <h1 class="headline">{{headline}}</h1>
  <p class="sub-headline">{{body}}</p>

  <div class="list">
    <div class="list-item">
      <span class="num">1</span>
      <div class="item-content">
        <div class="item-title">{{item_title_1}}</div>
        <div class="item-text">{{item_desc_1}}</div>
      </div>
    </div>
    <div class="list-item">
      <span class="num">2</span>
      <div class="item-content">
        <div class="item-title">{{item_title_2}}</div>
        <div class="item-text">{{item_desc_2}}</div>
      </div>
    </div>
    <div class="list-item">
      <span class="num">3</span>
      <div class="item-content">
        <div class="item-title">{{item_title_3}}</div>
        <div class="item-text">{{item_desc_3}}</div>
      </div>
    </div>
    <div class="list-item">
      <span class="num">4</span>
      <div class="item-content">
        <div class="item-title">{{item_title_4}}</div>
        <div class="item-text">{{item_desc_4}}</div>
      </div>
    </div>
  </div>

  <div class="bottom-box">
    <p>{{subtext}}</p>
  </div>

  <div class="footer">
    <span class="brand-name">{{academy_name}}</span>
    <span class="page-num">{{card_number}}</span>
  </div>
</div>
</body>
</html>
