<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #2563EB;
  --color-secondary: #10B981;
  --color-background: #F0F4FF;
  --color-text: #1A1A2E;
  --color-highlight: #FEF08A;
  --color-accent: #EF4444;
  --color-white: #FFFFFF;
  --color-black: #111111;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: visible;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all; line-height: 1.45;
  background: var(--color-primary); color: var(--color-white);
  position: relative;
}
.bg-image {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 1350px;
  background-size: cover; background-position: center;
  z-index: 0;
}
.overlay {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 1350px;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.2) 0%,
    rgba(0,0,0,0.55) 60%,
    rgba(0,0,0,0.8) 100%
  );
  z-index: 1;
}
.vignette {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 1350px;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
  z-index: 2;
}
.content {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 80px;
  z-index: 3;
}
.accent-line {
  width: 60px; height: 5px;
  background: var(--color-accent);
  border-radius: 3px; margin-bottom: 30px;
}
.headline {
  font-size: 54px; font-weight: 900;
  line-height: 1.3; max-width: 900px;
  margin-bottom: 20px;
}
.subtext {
  font-size: 22px; opacity: 0.7;
  max-width: 800px;
}
.academy {
  position: absolute; top: 40px; left: 60px;
  font-size: 18px; font-weight: 700;
  opacity: 0.8; z-index: 3;
}
em.highlight { background: var(--color-highlight); color: var(--color-black); font-style: normal; padding: 2px 8px; }
em.color { color: var(--color-accent); font-weight: 900; font-style: normal; }
em.underline { border-bottom: 6px solid var(--color-accent); font-style: normal; padding-bottom: 2px; }
</style>
</head>
<body>
<div class="bg-image" style="background-image: url('{{bg_image_url}}')"></div>
<div class="overlay"></div>
<div class="vignette"></div>
<span class="academy">{{academy_name}}</span>
<div class="content">
  <div class="accent-line"></div>
  <h1 class="headline">{{headline}}</h1>
  <p class="subtext">{{subtext}}</p>
</div>
</body>
</html>
