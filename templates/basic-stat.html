<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #2563EB;
  --color-secondary: #10B981;
  --color-background: #F0F4FF;
  --color-text: #1A1A2E;
  --color-highlight: #FEF08A;
  --color-accent: #EF4444;
  --color-white: #FFFFFF;
  --color-black: #111111;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all;
  background: var(--color-background); color: var(--color-text);
}
.card {
  width: 1080px; height: 1350px;
  display: flex; flex-direction: column;
  padding: 72px 80px;
  position: relative;
}

.tag {
  font-size: 22px; font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 2px; margin-bottom: 20px;
  text-transform: uppercase; opacity: 0.7;
}
.headline {
  font-size: 52px; font-weight: 900;
  line-height: 1.25; max-width: 800px;
  color: var(--color-text);
}

.stat-section { margin: 40px 0 16px 0; }
.stat {
  font-size: 160px; font-weight: 900;
  color: var(--color-primary);
  line-height: 1; letter-spacing: -4px;
}
.stat-accent {
  display: inline-block; width: 100%; height: 8px;
  background: var(--color-accent);
  border-radius: 4px; margin-top: 8px; max-width: 300px;
}
.stat-label {
  font-size: 30px; font-weight: 700;
  color: var(--color-text); opacity: 0.6;
  margin-top: 16px;
}

.divider {
  width: 80px; height: 3px;
  background: var(--color-primary);
  margin: 40px 0; opacity: 0.3;
}
.body-text {
  font-size: 26px; font-weight: 400;
  line-height: 1.7; color: var(--color-text); opacity: 0.5;
  max-width: 860px;
}

.footer {
  margin-top: auto;
  display: flex; justify-content: space-between;
  align-items: flex-end; padding-bottom: 8px;
}
.brand-name {
  font-size: 22px; font-weight: 700;
  color: var(--color-primary); opacity: 0.4;
  letter-spacing: 2px;
}
.page-num {
  font-size: 22px; color: var(--color-text); opacity: 0.25;
}

em.highlight {
  font-style: normal; font-weight: 900;
  background: linear-gradient(to top, var(--color-highlight) 40%, transparent 40%);
  padding: 0 4px;
  box-decoration-break: clone; -webkit-box-decoration-break: clone;
}
em.color { font-style: normal; font-weight: 900; color: var(--color-primary); }
em.underline { font-style: normal; font-weight: 900; border-bottom: 5px solid var(--color-accent); padding-bottom: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="tag">{{tag}}</div>
  <h2 class="headline">{{headline}}</h2>

  <div class="stat-section">
    <div class="stat">{{stat}}</div>
    <div class="stat-accent"></div>
    <p class="stat-label">{{stat_label}}</p>
  </div>

  <div class="divider"></div>

  <p class="body-text">{{body}}</p>
  <p class="body-text" style="margin-top:16px;">{{subtext}}</p>

  <div class="footer">
    <span class="brand-name">{{academy_name}}</span>
    <span class="page-num">{{card_number}}</span>
  </div>
</div>
</body>
</html>
