<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #2563EB;
  --color-secondary: #10B981;
  --color-background: #F0F4FF;
  --color-text: #1A1A2E;
  --color-highlight: #FEF08A;
  --color-accent: #EF4444;
  --color-white: #FFFFFF;
  --color-black: #111111;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all;
  background: var(--color-primary); color: var(--color-white);
}
.card {
  width: 1080px; height: 1350px;
  padding: 72px 80px;
  display: flex; flex-direction: column;
  position: relative;
}

.top-accent {
  width: 100%; height: 6px;
  background: var(--color-secondary);
  position: absolute; top: 0; left: 0;
}
.tag {
  font-size: 20px; font-weight: 700;
  color: rgba(255,255,255,0.6);
  letter-spacing: 3px; margin-top: 20px; margin-bottom: 24px;
  text-transform: uppercase;
}
.headline {
  font-size: 56px; font-weight: 900;
  line-height: 1.35; margin-bottom: 20px;
  max-width: 900px;
}
.subtext {
  font-size: 24px; font-weight: 400;
  color: rgba(255,255,255,0.6);
  line-height: 1.7; margin-bottom: 48px;
  max-width: 800px;
}

.cta-area {
  flex: 1;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
}
.cta-box {
  width: 100%;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 24px; padding: 48px 56px;
  text-align: center; margin-bottom: 32px;
}
.cta-box-title {
  font-size: 32px; font-weight: 900; margin-bottom: 12px;
}
.cta-box-desc {
  font-size: 22px; color: rgba(255,255,255,0.5);
  line-height: 1.6;
}

.cta-btn {
  display: inline-flex; align-items: center; gap: 14px;
  background: var(--color-white); color: var(--color-primary);
  font-size: 36px; font-weight: 900;
  padding: 28px 72px; border-radius: 60px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.cta-sub {
  font-size: 20px;
  color: rgba(255,255,255,0.4);
  margin-top: 20px;
}

.footer {
  margin-top: auto; padding-top: 24px;
  display: flex; justify-content: space-between;
  align-items: flex-end;
}
.brand-name {
  font-size: 22px; font-weight: 700;
  color: rgba(255,255,255,0.3);
  letter-spacing: 2px;
}
.page-num {
  font-size: 22px; color: rgba(255,255,255,0.25);
}

.deco-ring {
  position: absolute; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.06);
}
.dr1 { width: 400px; height: 400px; top: -120px; right: -80px; }
.dr2 { width: 240px; height: 240px; bottom: 100px; left: -60px; }

/* 어두운 배경: 마커 대신 색상 강조 */
em.highlight {
  font-style: normal; font-weight: 900;
  color: var(--color-secondary);
}
em.color { font-style: normal; font-weight: 900; color: var(--color-secondary); }
em.underline { font-style: normal; font-weight: 900; border-bottom: 5px solid var(--color-secondary); padding-bottom: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="top-accent"></div>
  <div class="deco-ring dr1"></div>
  <div class="deco-ring dr2"></div>
  <div class="tag">CONTACT US</div>
  <h1 class="headline">{{headline}}</h1>
  <p class="subtext">{{subtext}}</p>
  <div class="cta-area">
    <div class="cta-box">
      <div class="cta-box-title">{{cta_text}}</div>
      <div class="cta-box-desc">{{cta_sub}}</div>
    </div>
    <div class="cta-btn">
      <span>상담 신청하기</span>
      <span style="font-size:32px;">→</span>
    </div>
    <p class="cta-sub">지금 바로 문의하세요</p>
  </div>
  <div class="footer">
    <span class="brand-name">{{academy_name}}</span>
    <span class="page-num">{{card_number}}</span>
  </div>
</div>
</body>
</html>
