<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #2563EB;
  --color-secondary: #10B981;
  --color-background: #F0F4FF;
  --color-text: #1A1A2E;
  --color-highlight: #FEF08A;
  --color-accent: #EF4444;
  --color-white: #FFFFFF;
  --color-black: #111111;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all;
  background: var(--color-primary); color: var(--color-white);
  position: relative;
}
.card {
  width: 1080px; height: 1350px;
  display: flex; flex-direction: column;
  padding: 72px 80px 0 80px;
  position: relative; overflow: hidden;
}

.tag {
  font-size: 22px; font-weight: 700;
  color: rgba(255,255,255,0.7);
  letter-spacing: 3px; margin-bottom: 40px;
  text-transform: uppercase;
}
.headline {
  font-size: 88px; font-weight: 900;
  line-height: 1.15; max-width: 920px;
  z-index: 2; letter-spacing: -1px;
  flex: 1; display: flex; align-items: center;
}
.subtext {
  font-size: 28px; font-weight: 400;
  line-height: 1.6; color: rgba(255,255,255,0.6);
  max-width: 760px; z-index: 2; margin-bottom: 40px;
}
.bg-area {
  width: 920px; height: 380px; border-radius: 20px;
  margin-top: 40px; margin-bottom: 40px;
  background-size: cover; background-position: center;
  overflow: hidden; z-index: 2;
}
.brand-bar {
  margin-top: auto; height: 100px;
  background: rgba(0,0,0,0.15);
  display: flex; align-items: center; justify-content: center;
  z-index: 3; margin-left: -80px; margin-right: -80px;
}
.brand-name {
  font-size: 22px; font-weight: 700;
  color: rgba(255,255,255,0.6); letter-spacing: 3px;
}

.deco { position: absolute; border-radius: 50%; pointer-events: none; z-index: 0; }
.deco-1 { width: 400px; height: 400px; top: -100px; right: -80px; border: 2px solid rgba(255,255,255,0.08); }
.deco-2 { width: 260px; height: 260px; bottom: 140px; right: 60px; border: 2px solid rgba(255,255,255,0.06); }

/* 어두운 배경: 마커 대신 색상 강조 */
em.highlight {
  font-style: normal; font-weight: 900;
  color: var(--color-secondary);
}
em.color { font-style: normal; font-weight: 900; color: var(--color-secondary); }
em.underline { font-style: normal; font-weight: 900; border-bottom: 6px solid var(--color-secondary); padding-bottom: 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="deco deco-1"></div>
  <div class="deco deco-2"></div>
  <span class="tag">{{tag}}</span>
  <h1 class="headline">{{headline}}</h1>
  <p class="subtext">{{subtext}}</p>
  <div class="bg-area" style="{{bg_image_style}}"></div>
  <div class="brand-bar">
    <span class="brand-name">{{academy_name}}</span>
  </div>
</div>
</body>
</html>
