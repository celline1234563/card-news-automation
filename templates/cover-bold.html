<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #2563EB;
  --color-secondary: #10B981;
  --color-background: #F0F4FF;
  --color-text: #1A1A2E;
  --color-highlight: #FEF08A;
  --color-accent: #EF4444;
  --color-white: #FFFFFF;
  --color-black: #111111;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: visible;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all;
  line-height: 1.45;
  background: var(--color-primary);
  color: var(--color-white);
  position: relative;
}

.card {
  width: 1080px;
  height: 1350px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 56px;
  position: relative;
}

/* 장식 도형 */
.deco-circle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.15;
}
.deco-1 { width: 340px; height: 340px; top: -80px; right: -60px; background: var(--color-secondary); }
.deco-2 { width: 200px; height: 200px; bottom: 180px; left: -50px; background: var(--color-secondary); }
.deco-3 { width: 140px; height: 140px; top: 200px; left: 140px; opacity: 0.08; background: var(--color-white); }
.deco-4 { width: 100px; height: 100px; top: 60px; left: 400px; opacity: 0.06; background: var(--color-white); }
.deco-5 { width: 240px; height: 240px; bottom: -40px; right: 120px; opacity: 0.07; background: var(--color-secondary); }
.deco-6 { width: 80px; height: 80px; top: 350px; right: 200px; opacity: 0.1; background: var(--color-white); }

/* 배경 이미지 영역 — bg_image_url이 없으면 inject.js가 제거 */
.bg-area {
  width: 960px;
  height: 440px;
  border-radius: 24px;
  margin-bottom: 56px;
  background-size: cover;
  background-position: center;
  overflow: hidden;
}

.headline {
  font-size: 72px;
  font-weight: 900;
  text-align: center;
  max-width: 960px;
  line-height: 1.3;
  margin-bottom: 28px;
  z-index: 1;
}

.subtext {
  font-size: 28px;
  font-weight: 400;
  text-align: center;
  opacity: 0.85;
  max-width: 860px;
  z-index: 1;
}

.academy {
  position: absolute;
  bottom: 44px;
  right: 56px;
  font-size: 20px;
  font-weight: 700;
  opacity: 0.7;
}

em.highlight { background: var(--color-highlight); color: var(--color-black); font-style: normal; padding: 2px 10px; }
em.color { color: var(--color-accent); font-weight: 900; font-style: normal; }
em.underline { border-bottom: 6px solid var(--color-accent); font-style: normal; padding-bottom: 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="deco-circle deco-1"></div>
  <div class="deco-circle deco-2"></div>
  <div class="deco-circle deco-3"></div>
  <div class="deco-circle deco-4"></div>
  <div class="deco-circle deco-5"></div>
  <div class="deco-circle deco-6"></div>
  <div class="bg-area" style="{{bg_image_style}}"></div>
  <h1 class="headline">{{headline}}</h1>
  <p class="subtext">{{subtext}}</p>
  <span class="academy">{{academy_name}}</span>
</div>
</body>
</html>
