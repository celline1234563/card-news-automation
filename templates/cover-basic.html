<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #2563EB;
  --color-secondary: #10B981;
  --color-background: #F0F4FF;
  --color-text: #1A1A2E;
  --color-highlight: #FEF08A;
  --color-accent: #EF4444;
  --color-white: #FFFFFF;
  --color-black: #111111;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: visible;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all; line-height: 1.45;
  background: var(--color-background); color: var(--color-text);
}
.card {
  width: 1080px; height: 1350px;
  display: flex; flex-direction: column;
  padding: 80px; position: relative;
}
.top-bar {
  width: 100%; height: 8px;
  background: var(--color-primary);
  position: absolute; top: 0; left: 0;
}
.tag {
  display: inline-block;
  background: var(--color-primary); color: var(--color-white);
  font-size: 18px; font-weight: 700;
  padding: 10px 28px; border-radius: 30px;
  margin-top: 80px; margin-bottom: 60px;
}
.headline {
  font-size: 54px; font-weight: 900;
  color: var(--color-text); line-height: 1.35;
  max-width: 900px; margin-bottom: 30px;
}
.divider {
  width: 80px; height: 4px;
  background: var(--color-primary);
  border-radius: 2px; margin-bottom: 40px;
}
.subtext {
  font-size: 22px; color: var(--color-text);
  opacity: 0.6; max-width: 800px;
}
.academy {
  position: absolute; bottom: 50px; right: 60px;
  font-size: 18px; font-weight: 700;
  color: var(--color-primary); opacity: 0.6;
}
em.highlight { background: var(--color-highlight); font-style: normal; padding: 2px 8px; }
em.color { color: var(--color-primary); font-weight: 900; font-style: normal; }
em.underline { border-bottom: 6px solid var(--color-accent); font-style: normal; padding-bottom: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="top-bar"></div>
  <span class="tag">{{tag}}</span>
  <h1 class="headline">{{headline}}</h1>
  <div class="divider"></div>
  <p class="subtext">{{subtext}}</p>
  <span class="academy">{{academy_name}}</span>
</div>
</body>
</html>
