<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #2563EB;
  --color-secondary: #10B981;
  --color-background: #F0F4FF;
  --color-text: #1A1A2E;
  --color-highlight: #FEF08A;
  --color-accent: #EF4444;
  --color-white: #FFFFFF;
  --color-black: #111111;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all;
  background: var(--color-background); color: var(--color-text);
}
.card {
  width: 1080px; height: 1350px;
  padding: 72px 80px;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  position: relative;
}
.top-bar {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 6px;
  background: var(--color-primary);
}
.deco-number {
  position: absolute; top: 60px; right: 40px;
  font-size: 280px; font-weight: 900;
  color: var(--color-primary); opacity: 0.06;
  line-height: 1;
}
.tag {
  font-size: 20px; font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 24px;
  display: inline-flex; align-items: center; gap: 12px;
}
.tag::before {
  content: ''; width: 32px; height: 3px;
  background: var(--color-primary); display: inline-block;
}
.headline {
  font-size: 72px; font-weight: 900;
  line-height: 1.25; margin-bottom: 24px;
  max-width: 900px; color: var(--color-text);
}
.divider {
  width: 60px; height: 4px;
  background: var(--color-primary);
  border-radius: 2px; margin-bottom: 28px;
}
.subtext {
  font-size: 26px; font-weight: 400;
  color: var(--color-text); opacity: 0.5;
  line-height: 1.7; max-width: 800px;
  margin-bottom: 48px;
}
.brand-bar {
  display: flex; justify-content: space-between;
  align-items: center; padding-top: 28px;
  border-top: 1px solid rgba(0,0,0,0.08);
}
.brand-name {
  font-size: 22px; font-weight: 700;
  color: var(--color-primary); opacity: 0.5;
  letter-spacing: 2px;
}
.page-num {
  font-size: 20px; color: var(--color-text); opacity: 0.25;
}

em.highlight {
  font-style: normal; font-weight: 900;
  background: linear-gradient(to top, var(--color-highlight) 40%, transparent 40%);
  padding: 0 4px;
  box-decoration-break: clone; -webkit-box-decoration-break: clone;
}
em.color { font-style: normal; font-weight: 900; color: var(--color-primary); }
em.underline { font-style: normal; font-weight: 900; border-bottom: 5px solid var(--color-accent); padding-bottom: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="top-bar"></div>
  <div class="deco-number">01</div>
  <div class="tag">{{tag}}</div>
  <h1 class="headline">{{headline}}</h1>
  <div class="divider"></div>
  <p class="subtext">{{subtext}}</p>
  <div class="brand-bar">
    <span class="brand-name">{{academy_name}}</span>
    <span class="page-num">{{card_number}}</span>
  </div>
</div>
</body>
</html>
