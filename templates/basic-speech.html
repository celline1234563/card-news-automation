<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #2563EB;
  --color-secondary: #10B981;
  --color-background: #F0F4FF;
  --color-text: #1A1A2E;
  --color-highlight: #FEF08A;
  --color-accent: #EF4444;
  --color-white: #FFFFFF;
  --color-black: #111111;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: visible;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all; line-height: 1.45;
  background: var(--color-background); color: var(--color-text);
}
.card {
  width: 1080px; height: 1350px; padding: 50px 56px; position: relative;
  display: flex; flex-direction: column; justify-content: center;
}
.card-num { position: absolute; top: 24px; right: 50px; font-size: 16px; font-weight: 700; color: var(--color-primary); opacity: 0.5; }
.headline { font-size: 36px; font-weight: 700; color: var(--color-text); opacity: 0.5; margin-bottom: 40px; }
.bubble-main {
  background: var(--color-primary); color: var(--color-white);
  border-radius: 28px 28px 28px 4px;
  padding: 48px 56px; font-size: 34px; font-weight: 500;
  line-height: 1.6; max-width: 900px; margin-bottom: 36px;
  position: relative;
}
.bubble-main::after {
  content: ''; position: absolute; bottom: -18px; left: 44px;
  border: 12px solid transparent;
  border-top-color: var(--color-primary); border-right-color: var(--color-primary);
}
.bubble-sub {
  background: var(--color-white); color: var(--color-text);
  border-radius: 28px 28px 4px 28px;
  padding: 36px 48px; font-size: 28px;
  max-width: 820px; align-self: flex-end; margin-bottom: 36px;
  position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.bubble-sub::after {
  content: ''; position: absolute; bottom: -16px; right: 44px;
  border: 10px solid transparent;
  border-top-color: var(--color-white); border-left-color: var(--color-white);
}
.sender {
  display: flex; align-items: center; gap: 16px; margin-top: 24px;
}
.avatar {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--color-primary); color: var(--color-white);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 900;
}
.sender-name { font-size: 22px; font-weight: 700; color: var(--color-text); opacity: 0.6; }
.subtext { margin-top: 40px; font-size: 20px; color: var(--color-text); opacity: 0.4; }
em.highlight { background: var(--color-highlight); font-style: normal; padding: 2px 8px; }
em.color { color: var(--color-primary); font-weight: 900; font-style: normal; }
em.underline { border-bottom: 6px solid var(--color-accent); font-style: normal; padding-bottom: 2px; }
</style>
</head>
<body>
<div class="card">
  <span class="card-num">{{card_number}}</span>
  <h2 class="headline">{{headline}}</h2>
  <div class="bubble-main">{{quote_main}}</div>
  <div class="bubble-sub">{{quote_sub}}</div>
  <div class="sender">
    <div class="avatar">{{sender}}</div>
    <span class="sender-name">{{sender}}</span>
  </div>
  <p class="subtext">{{subtext}}</p>
</div>
</body>
</html>
