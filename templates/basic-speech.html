<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #2563EB;
  --color-secondary: #10B981;
  --color-background: #F0F4FF;
  --color-text: #1A1A2E;
  --color-highlight: #FEF08A;
  --color-accent: #EF4444;
  --color-white: #FFFFFF;
  --color-black: #111111;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all;
  background: var(--color-background); color: var(--color-text);
}
.card {
  width: 1080px; height: 1350px;
  padding: 72px 80px;
  display: flex; flex-direction: column;
  position: relative;
}

.tag {
  font-size: 22px; font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 2px; margin-bottom: 16px;
  text-transform: uppercase; opacity: 0.7;
}
.headline {
  font-size: 48px; font-weight: 900;
  line-height: 1.3; margin-bottom: 40px;
  color: var(--color-text);
}

.quote-area {
  flex: 1;
  display: flex; flex-direction: column;
  justify-content: center; gap: 24px;
}

.big-quote {
  font-size: 120px; font-weight: 900;
  color: var(--color-primary); opacity: 0.15;
  line-height: 0.6; margin-bottom: -20px;
}

.bubble-main {
  background: var(--color-white);
  border-left: 5px solid var(--color-primary);
  border-radius: 0 20px 20px 0;
  padding: 40px 44px;
  font-size: 28px; font-weight: 500;
  line-height: 1.7;
  color: var(--color-text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.bubble-sub {
  background: var(--color-white);
  border-left: 5px solid var(--color-secondary);
  border-radius: 0 20px 20px 0;
  padding: 32px 44px;
  font-size: 24px; line-height: 1.7;
  color: var(--color-text); opacity: 0.6;
  margin-left: 40px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.03);
}

.sender-row {
  display: flex; align-items: center; gap: 16px;
  margin-top: 8px;
}
.avatar {
  width: 56px; height: 56px;
  border-radius: 14px;
  background: var(--color-primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900;
  color: var(--color-white);
}
.sender-info { display: flex; flex-direction: column; }
.sender-name {
  font-size: 22px; font-weight: 700;
  color: var(--color-text);
}
.sender-role {
  font-size: 18px;
  color: var(--color-text); opacity: 0.4;
}

.bottom-note {
  margin-top: 28px;
  background: var(--color-white);
  border-radius: 16px; padding: 24px 32px;
  font-size: 22px;
  color: var(--color-text); opacity: 0.5;
  line-height: 1.6;
  box-shadow: 0 2px 8px rgba(0,0,0,0.03);
}

.footer {
  margin-top: 28px;
  display: flex; justify-content: space-between;
  align-items: flex-end;
}
.brand-name {
  font-size: 22px; font-weight: 700;
  color: var(--color-primary); opacity: 0.4;
  letter-spacing: 2px;
}
.page-num {
  font-size: 22px; color: var(--color-text); opacity: 0.25;
}

em.highlight {
  font-style: normal; font-weight: 900;
  background: linear-gradient(to top, var(--color-highlight) 40%, transparent 40%);
  padding: 0 4px;
  box-decoration-break: clone; -webkit-box-decoration-break: clone;
}
em.color { font-style: normal; font-weight: 900; color: var(--color-primary); }
em.underline { font-style: normal; font-weight: 900; border-bottom: 5px solid var(--color-accent); padding-bottom: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="tag">{{tag}}</div>
  <h1 class="headline">{{headline}}</h1>
  <div class="quote-area">
    <div class="big-quote">"</div>
    <div class="bubble-main">{{quote_main}}</div>
    <div class="bubble-sub">{{quote_sub}}</div>
    <div class="sender-row">
      <div class="avatar">{{sender}}</div>
      <div class="sender-info">
        <span class="sender-name">{{sender}}</span>
        <span class="sender-role">학부모</span>
      </div>
    </div>
  </div>
  <div class="bottom-note">{{subtext}}</div>
  <div class="footer">
    <span class="brand-name">{{academy_name}}</span>
    <span class="page-num">{{card_number}}</span>
  </div>
</div>
</body>
</html>
